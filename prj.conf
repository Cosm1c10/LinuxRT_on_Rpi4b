# ===========================================================================
# Sentinel-RT Zephyr Project Configuration (rpi_4b)
# ===========================================================================

# ---------------------------------------------------------------------------
# POSIX Compatibility Layer
# Enables pthread_create/join/mutex, usleep, sleep, printf via POSIX shim.
# sensor_manager.c and sensor_test.c use these without modification.
# ---------------------------------------------------------------------------
CONFIG_POSIX_API=y
CONFIG_PTHREAD_IPC=y
CONFIG_POSIX_PTHREAD_ATTR_STACKSIZE_DEFAULT=4096

# ---------------------------------------------------------------------------
# Heap / Stack
# The server spawns a thread per client; each needs its own stack.
# ---------------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ---------------------------------------------------------------------------
# Networking — TCP/IP stack
# ---------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16

# ---------------------------------------------------------------------------
# TLS / MbedTLS
# Provides mTLS server, peer-certificate verification, and X.509 parsing.
# ---------------------------------------------------------------------------
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_TLS_VERSION_1_2=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_KEY_EXCHANGE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_SHA256_ENABLED=y
CONFIG_MBEDTLS_SHA512_ENABLED=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_X509_CRL_PARSE=n
CONFIG_MBEDTLS_X509_CSR_PARSE=n
# Required for TLS_NATIVE getsockopt (peer cert extraction for RBAC)
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=n

# ---------------------------------------------------------------------------
# Hardware Peripherals
# ---------------------------------------------------------------------------
CONFIG_GPIO=y
CONFIG_I2C=y

# ---------------------------------------------------------------------------
# FPU (needed for float arithmetic in sensor calculations)
# ---------------------------------------------------------------------------
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# ---------------------------------------------------------------------------
# Console / Logging
# ---------------------------------------------------------------------------
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
CONFIG_CBPRINTF_FP_SUPPORT=y
